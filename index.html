const KW={default:["led","managed","developed","implemented","increased","reduced","improved","delivered","collaborated","optimized","analyzed","designed","automated","launched"],"software engineer":["architected","deployed","optimized","CI/CD","microservices","REST API","Docker","Kubernetes","unit testing","scalability","agile","code review"],"frontend engineer":["React","Vue","Angular","TypeScript","responsive design","Web Vitals","state management","lazy loading","A/B testing"],"backend engineer":["Node.js","REST API","GraphQL","Redis","caching","JWT","microservices","load balancing","CI/CD","database optimization"],"data scientist":["machine learning","Python","TensorFlow","PyTorch","predictive model","feature engineering","SQL","data pipeline","NLP"],"product manager":["roadmap","OKRs","user research","A/B testing","KPIs","stakeholder alignment","sprint planning","user stories","go-to-market","NPS"],"ux designer":["user research","wireframes","prototypes","Figma","usability testing","design system","accessibility","user journey"],"marketing manager":["campaign ROI","lead generation","conversion rate","SEO","SEM","email marketing","HubSpot","brand awareness"],"sales manager":["quota attainment","revenue growth","pipeline","CRM","Salesforce","deal closure","upselling","win rate"],"hr professional":["talent acquisition","onboarding","performance management","HRIS","employee engagement","compliance","retention"],"project manager":["on-time delivery","budget management","risk mitigation","Agile","Scrum","PMP","milestone","resource allocation"],"finance analyst":["financial modeling","DCF","variance analysis","P&L","budget forecasting","Excel","EBITDA","reconciliation"],"cybersecurity analyst":["SIEM","penetration testing","vulnerability assessment","NIST","SOC","incident response","zero-trust","OWASP"]};
function getKW(title,skills){const t=(title||"").toLowerCase().trim();let k=KW[t]||(KW[Object.keys(KW).find(k2=>t.includes(k2))||"default"]||KW.default);const sk=Object.values(skills||{}).filter(Boolean).join(",").split(",").map(s=>s.trim()).filter(s=>s.length>2).slice(0,8);return[...new Set([...k,...sk])].slice(0,20);}
function boldKW(text,kws){if(!text||!kws||!kws.length)return text;const safe=kws.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"));return text.replace(new RegExp("("+safe.join("|")+")","gi"),"<strong>$1</strong>");}
const TLIST=["React","Vue","Angular","Next.js","TypeScript","JavaScript","HTML","CSS","Tailwind","Node.js","Express","FastAPI","Django","Flask","Spring","Python","Java","Go","Rust","C#","PHP","Ruby","Kotlin","Swift","AWS","Azure","GCP","Docker","Kubernetes","Terraform","CI/CD","GitHub Actions","Jenkins","PostgreSQL","MySQL","MongoDB","Redis","Elasticsearch","Oracle","SQL","PL/SQL","GraphQL","REST API","Kafka","Spark","Airflow","BigQuery","Snowflake","Git","JIRA","Figma","Linux","TensorFlow","PyTorch","Pandas","Tableau","Power BI","Excel","Salesforce","SAP",".NET","ASP.NET","Agile","Scrum","DevOps","Machine Learning","NLP","Oracle Siebel","Siebel CRM","PeopleSoft","Selenium","Jest","Postman","Datadog","Prometheus","Grafana"];
const SLIST=["communication","leadership","teamwork","collaboration","problem solving","critical thinking","time management","attention to detail","adaptability","analytical","interpersonal","stakeholder","cross-functional","mentoring","negotiation"];
function extractTech(text){
  const found=new Set();
  const rxs=[/required\s+skill[s]?\s*[:\-]\s*([^\n]{2,120})/gi,/must[\s\-]have\s+skill[s]?\s*[:\-]\s*([^\n]{2,120})/gi,/must\s+to\s+have\s+skill[s]?\s*[:\-]\s*([^\n]{2,120})/gi,/technical\s+skill[s]?\s*[:\-]\s*([^\n]{2,120})/gi,/proficiency\s+in\s+([A-Za-z0-9 .,\/+#\-]{3,80}?)(?:\.|$|\n)/gi,/experience\s+(?:with|in)\s+([A-Za-z0-9 .,\/+#\-]{3,80}?)(?:\.|$|\n|,)/gi,/knowledge\s+of\s+([A-Za-z0-9 .,\/+#\-]{3,80}?)(?:\.|$|\n)/gi,/familiarity\s+with\s+([A-Za-z0-9 .,\/+#\-]{3,80}?)(?:\.|$|\n)/gi];
  const noise=new Set(["and","or","the","with","for","in","of","a","an","is","are","be","by","at","to","as","on","etc","na","good","have","has","strong","ability","skills","experience","knowledge","background","understanding","proficiency","familiarity","working","application","development","software","testing","debugging","database","management","techniques","practices","frameworks","solutions"]);
  rxs.forEach(rx=>{rx.lastIndex=0;let m;while((m=rx.exec(text))!==null){m[1].split(/[,&\/]|\band\b/i).map(p=>p.replace(/\(.*?\)/g,"").replace(/^\W+|\W+$/g,"").replace(/^(proficiency in|experience with|experience in|knowledge of|familiarity with)\s+/i,"").trim()).filter(p=>p.length>=2&&p.length<=60&&!/^(na|n\/a|none|tbd)$/i.test(p)).forEach(p=>{if(!noise.has(p.toLowerCase()))found.add(p);});}});
  TLIST.forEach(tech=>{const esc=tech.replace(/[+.]/g,"\\$&");if(new RegExp("\\b"+esc+"\\b","i").test(text))found.add(tech);});
  let arr=[...found].filter(s=>s.length>1&&!noise.has(s.toLowerCase()));
  const seen=new Map();arr.forEach(s=>{const k=s.toLowerCase();if(!seen.has(k)||s.length>seen.get(k).length)seen.set(k,s);});
  const vals=[...seen.values()];
  return vals.filter(s=>!vals.some(o=>o!==s&&o.toLowerCase().includes(s.toLowerCase())&&o.length>s.length)).slice(0,20);
}
function localAnalyse(raw){
  if(!raw||raw.length<50)return null;
  let text=raw;
  const nm=[/similar\s+jobs?\b/i,/discover\s+where\s+this\s+job/i,/about\s+accenture/i,/important\s+notice/i,/privacy\s+statement/i,/cookie\s+policy/i];
  for(const rx of nm){const idx=text.search(rx);if(idx>200){text=text.slice(0,idx);break;}}
  let jobTitle=null;
  const trxs=[/project\s+role\s*[:\-]\s*([^\n|]{3,60})/i,/position\s*[:\-]\s*([^\n]{3,60})/i,/(?:looking\s+for|hiring)\s+([A-Z][^\n,.]{3,55})/i];
  for(const rx of trxs){const m=text.match(rx);if(m){jobTitle=m[1].replace(/\s*[|].*/,"").trim();break;}}
  if(!jobTitle){const m=text.match(/^([A-Z][A-Za-z\s\/\-]{5,55})$/m);if(m)jobTitle=m[1].trim();}
  let company=null;
  const cm=text.match(/about\s+([A-Z][A-Za-z0-9\s&,.]{2,40}?)(?:\s*\n)/i);
  if(cm&&!/^(us|our|the)$/i.test(cm[1].trim()))company=cm[1].trim();
  let experienceYears=null;
  const erxs=[[/minimum\s+(\d+)\s*year/i,m=>m[1]+"+ years"],[/(\d+)\s*\+\s*years?/i,m=>m[1]+"+ years"],[/(\d+)\s*[-]\s*(\d+)\s*years?/i,m=>m[1]+"-"+m[2]+" years"],[/at\s+least\s+(\d+)\s*years?/i,m=>m[1]+"+ years"]];
  for(const[rx,fmt]of erxs){const m=text.match(rx);if(m){experienceYears=fmt(m);break;}}
  let experienceLevel=null;
  if(/\b(junior|entry[\s-]level|associate|fresher)\b/i.test(text))experienceLevel="Junior";
  else if(/\b(senior|sr\.?|lead|principal|staff)\b/i.test(text))experienceLevel="Senior";
  else if(/\b(mid[\s-]level|intermediate)\b/i.test(text))experienceLevel="Mid-level";
  else if(/\b(manager|director|head\s+of|vp)\b/i.test(text))experienceLevel="Lead";
  const nm2=text.match(/(?:good\s+to\s+have|nice[\s-]to[\s-]have|preferred)[:\s\n]([\s\S]{0,600})/i);
  const nt=nm2?nm2[1]:"";const mt=nm2?text.slice(0,nm2.index):text;
  const techStack=extractTech(mt);
  const niceToHave=nt?extractTech(nt).filter(s=>!techStack.some(t=>t.toLowerCase()===s.toLowerCase())):[];
  const softSkills=SLIST.filter(p=>new RegExp(p,"i").test(text)).map(p=>p.replace(/\b\w/g,c=>c.toUpperCase()));
  let workMode=null;
  if(/\bfully\s+remote\b|\bwork\s+from\s+home\b/i.test(text))workMode="Remote";
  else if(/\bhybrid\b/i.test(text))workMode="Hybrid";
  else if(/\bon[\s-]site\b|\bin[\s-]office\b/i.test(text))workMode="On-site";
  let salaryRange=null;
  const sm=text.match(/[A-Z$][0-9,]+\s*(?:[-]\s*[A-Z$]?[0-9,]+)?\s*(?:LPA|lpa|k|per\s+annum)?/);
  if(sm)salaryRange=sm[0].trim();
  const requirements=text.split("\n").filter(l=>/^\s*[-*]\s+.{15,}/.test(l)).map(l=>l.replace(/^\s*[-*]\s*/,"").trim()).filter(Boolean).slice(0,7);
  const verbs=["led","managed","built","developed","designed","implemented","deployed","optimized","reduced","increased","delivered","automated","launched","architected"];
  const keywords=[...new Set([...techStack.slice(0,12),...verbs.filter(v=>new RegExp("\\b"+v+"\\b","i").test(text))])].slice(0,20);
  let summary="";
  const sM=text.match(/summary[:\s\n]+([\s\S]{40,400}?)(?:\n\n|\nRoles|\nJob)/i);
  if(sM)summary=sM[1].replace(/\n/g," ").trim().slice(0,280);
  if(!summary){const p=text.split("\n\n").find(p=>p.trim().length>80)||"";summary=p.replace(/\n/g," ").trim().slice(0,280);}
  if(!summary)summary="We are looking for a "+(jobTitle||"qualified professional")+" to join the team.";
  return{jobTitle,company,experienceYears,experienceLevel,techStack,softSkills,keywords,requirements,niceToHave,salaryRange,workMode,summary};
}
async function fetchPage(rawUrl){
  const enc=encodeURIComponent(rawUrl);

  // Strategy 1: Jina Reader — designed for text extraction from any URL, works on most job sites
  try{
    const r=await fetch("https://r.jina.ai/"+rawUrl,{
      headers:{"Accept":"text/plain","X-Return-Format":"text"},
      signal:AbortSignal.timeout(15000)
    });
    if(r.ok){
      const t=await r.text();
      if(t&&t.length>300)return t.replace(/\s{3,}/g," ").trim();
    }
  }catch(e){}

  // Strategy 2: Jina without headers (fallback)
  try{
    const r=await fetch("https://r.jina.ai/"+rawUrl,{signal:AbortSignal.timeout(12000)});
    if(r.ok){
      const t=await r.text();
      if(t&&t.length>300)return t.replace(/\s{3,}/g," ").trim();
    }
  }catch(e){}

  // Strategy 3: corsproxy.io
  try{
    const r=await fetch("https://corsproxy.io/?"+enc,{signal:AbortSignal.timeout(10000)});
    if(r.ok){
      const html=await r.text();
      if(html&&html.length>300){const txt=htmlToText(html);if(txt&&txt.length>150)return txt;}
    }
  }catch(e){}

  // Strategy 4: allorigins
  try{
    const r=await fetch("https://api.allorigins.win/get?url="+enc,{signal:AbortSignal.timeout(10000)});
    if(r.ok){
      const j=await r.json();
      const html=j?.contents||"";
      if(html.length>300){const txt=htmlToText(html);if(txt&&txt.length>150)return txt;}
    }
  }catch(e){}

  // Strategy 5: thingproxy
  try{
    const r=await fetch("https://thingproxy.freeboard.io/fetch/"+rawUrl,{signal:AbortSignal.timeout(10000)});
    if(r.ok){
      const html=await r.text();
      if(html&&html.length>300){const txt=htmlToText(html);if(txt&&txt.length>150)return txt;}
    }
  }catch(e){}

  return null;

  function htmlToText(html){
    try{
      const div=document.createElement("div");div.innerHTML=html;
      ["script","style","nav","header","footer","noscript","aside"].forEach(t=>div.querySelectorAll(t).forEach(el=>el.remove()));
      const sel=["[class*='job-description']","[class*='jobDescription']","[class*='description__text']","[id*='job-description']","[class*='job-details']","[class*='jobDetails']","main","article","[role='main']","body"];
      for(const s of sel){
        try{
          const el=div.querySelector(s);
          if(el){const t=(el.innerText||el.textContent||"").replace(/\s{3,}/g," ").trim();if(t.length>200)return t;}
        }catch(e){}
      }
      return(div.innerText||div.textContent||"").replace(/\s{3,}/g," ").trim();
    }catch(e){return"";}
  }
}

function allSkills(sk){
  // Tech templates: return labelled categories
  const cats=[
    sk.frontend&&"Frontend: "+sk.frontend,
    sk.backend&&"Backend: "+sk.backend,
    sk.cloud&&"Cloud: "+sk.cloud,
    sk.database&&"Database: "+sk.database,
    sk.tools&&"Tools: "+sk.tools,
  ].filter(Boolean);

  const other=sk.other?sk.other.trim():"";
  return{cats,other};
}

function BulletEditor({color,bullets,onChange,isFresher}){
  const lines=(bullets||"").split("\n").map(l=>l.replace(/^[-*]\s*/,"").trim()).filter(Boolean);
  const[editing,setEditing]=useState(null); // index being edited
  const[editVal,setEditVal]=useState("");
  const[newLine,setNewLine]=useState("");

  function commit(i,val){
    const updated=[...lines];
    if(val.trim())updated[i]=val.trim();
    else updated.splice(i,1);
    onChange(updated.map(l=>"- "+l).join("\n"));
    setEditing(null);setEditVal("");
  }
  function deleteLine(i){const updated=[...lines];updated.splice(i,1);onChange(updated.map(l=>"- "+l).join("\n"));}
  function addLine(){const t=newLine.trim();if(!t)return;onChange([...lines,t].map(l=>"- "+l).join("\n"));setNewLine("");}

  // Render line with **bold** markers highlighted
  function renderPreview(text){
    return text.replace(/\*\*([^*]+)\*\*/g,'<strong style="color:'+color+';">$1</strong>');
  }

  const ph=isFresher?"e.g. Assisted in developing React components as part of agile team":"e.g. Led migration to microservices reducing latency by 40%";

  return(
    <div style={{marginBottom:10}}>
      <label style={{display:"block",fontSize:10.5,fontWeight:600,color:"#555",marginBottom:6,textTransform:"uppercase",letterSpacing:0.4}}>
        Key Responsibilities &amp; Achievements
      </label>
      <div style={{border:"1px solid #ddd",borderRadius:7,overflow:"hidden",background:"#fff"}}>
        {lines.length===0&&<div style={{padding:"12px 14px",color:"#aaa",fontSize:12,fontStyle:"italic"}}>No bullet points yet. Add your first one below.</div>}
        {lines.map((line,i)=>(
          <div key={i} style={{borderBottom:"1px solid #f0f0f0",padding:"8px 12px",display:"flex",alignItems:"flex-start",gap:8,background:editing===i?"#f8f9ff":"#fff"}}>
            <span style={{color:color,fontWeight:700,fontSize:14,flexShrink:0,marginTop:1}}>•</span>
            {editing===i?(
              <div style={{flex:1,display:"flex",gap:6,alignItems:"flex-start"}}>
                <textarea value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();commit(i,editVal);}if(e.key==="Escape"){setEditing(null);setEditVal("");}}}
                  style={{flex:1,padding:"4px 8px",border:"1px solid "+color+"60",borderRadius:5,fontSize:12,resize:"vertical",fontFamily:"inherit",outline:"none",minHeight:36,lineHeight:1.5}} autoFocus rows={2}/>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <button onClick={()=>commit(i,editVal)} style={{background:color,color:"#fff",border:"none",padding:"3px 9px",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:600}}>Save</button>
                  <button onClick={()=>{setEditing(null);setEditVal("");}} style={{background:"#f0f0f0",color:"#555",border:"none",padding:"3px 9px",borderRadius:4,cursor:"pointer",fontSize:11}}>Cancel</button>
                </div>
              </div>
            ):(
              <>
                <div style={{flex:1,fontSize:12,lineHeight:1.55,color:"#333"}} dangerouslySetInnerHTML={{__html:renderPreview(line)}}/>
                <div style={{display:"flex",gap:5,flexShrink:0,marginTop:1}}>
                  <button onClick={()=>{setEditing(i);setEditVal(line);}} style={{background:"#e3f2fd",color:"#1565c0",border:"none",padding:"2px 8px",borderRadius:4,cursor:"pointer",fontSize:10.5,fontWeight:600}}>Edit</button>

                </div>
              </>
            )}
          </div>
        ))}
        <div style={{padding:"8px 12px",borderTop:lines.length?"1px solid #f0f0f0":"none",background:"#fafafa",display:"flex",gap:8,alignItems:"flex-start"}}>
          <span style={{color:"#aaa",fontWeight:700,fontSize:14,flexShrink:0,marginTop:6}}>+</span>
          <textarea value={newLine} onChange={e=>setNewLine(e.target.value)} placeholder={ph}
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addLine();}}}
            style={{flex:1,padding:"5px 9px",border:"1px solid #e0e0e0",borderRadius:5,fontSize:12,resize:"none",fontFamily:"inherit",outline:"none",background:"#fff",lineHeight:1.5}} rows={2}/>

    </div>
  );
}

        tech[2]?`- Contributed to testing and debugging using ${tech[2]} methodologies`:"",
        tech[3]?`- Supported team in building and maintaining ${tech[3]} components`:"",
        `- Participated in daily standups and agile sprint planning sessions`,
        `- Documented technical specifications and assisted in code reviews`,
      ].filter(Boolean);
      return lines.join("\n");
    }else{
      // Ownership style — led, drove, architected
      const lines=[
        tech[0]?`- Led design and implementation of ${tech[0]} solutions delivering measurable business impact`:"",
        tech[1]?`- Architected scalable ${tech[1]} systems improving performance by 40%`:"",
        tech[2]?`- Drove adoption of ${tech[2]} across the team, reducing delivery time by 30%`:"",
        tech[3]?`- Owned end-to-end development of ${tech[3]} features from requirements to deployment`:"",
        `- Mentored junior engineers and conducted code reviews to maintain quality standards`,
        `- Collaborated with stakeholders to align technical decisions with business objectives`,
      ].filter(Boolean);
      return lines.join("\n");
    }

                ))}
              </Card>
              {showProj&&<Card title="Projects" color={tpl.c} onAdd={()=>addI("projects",{name:"",tech:"",description:"",url:""})} addLabel="Add Project">{form.projects.map((proj,idx)=><div key={proj.id} style={{marginBottom:11,paddingBottom:11,borderBottom:idx<form.projects.length-1?"1px dashed #eee":"none"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontWeight:700,fontSize:12,color:tpl.c}}>{"Project "+(idx+1)}</span><RemBtn f="projects" i={idx}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 11px"}}><Inp label="Project Name" value={proj.name} onChange={v=>setN("projects",idx,"name",v)}/><Inp label="Tech Stack" value={proj.tech} onChange={v=>setN("projects",idx,"tech",v)} placeholder="React, Node.js"/><LInp label="Project URL" value={proj.url} onChange={v=>setN("projects",idx,"url",v)}/></div><TA label="Description" value={proj.description} onChange={v=>setN("projects",idx,"description",v)} rows={2} placeholder="What you built and its impact..."/></div>)}</Card>}
              {showPub&&<Card title="Publications" color={tpl.c} onAdd={()=>addI("publications",{title:"",journal:"",year:"",authors:""})} addLabel="Add">{form.publications.map((pub,idx)=><div key={pub.id} style={{marginBottom:9,paddingBottom:9,borderBottom:idx<form.publications.length-1?"1px dashed #eee":"none"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontWeight:700,fontSize:12,color:tpl.c}}>{"Publication "+(idx+1)}</span><RemBtn f="publications" i={idx}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 11px"}}><Inp label="Title" value={pub.title} onChange={v=>setN("publications",idx,"title",v)}/><Inp label="Journal" value={pub.journal} onChange={v=>setN("publications",idx,"journal",v)}/><Inp label="Year" type="number" value={pub.year} onChange={v=>setN("publications",idx,"year",v)} min="1900" max="2099" placeholder="2024"/><Inp label="Authors" value={pub.authors} onChange={v=>setN("publications",idx,"authors",v)} placeholder="Smith J., Doe A."/></div></div>)}</Card>}
              {showFed&&<Card title="Federal Application" color={tpl.c}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 11px"}}><Inp label="Citizenship" value={form.citizenship} onChange={v=>setF("citizenship",v)} placeholder="U.S. Citizen"/><Inp label="Security Clearance" value={form.securityClearance} onChange={v=>setF("securityClearance",v)} placeholder="TS/SCI"/><Inp label="Federal Grade" value={form.federalGrade} onChange={v=>setF("federalGrade",v)} placeholder="GS-13"/></div></Card>}
              <Card title="Additional Information" color={tpl.c}><TA label="Awards and Achievements (one per line)" value={form.awards} onChange={v=>setF("awards",v)} rows={3} placeholder={"Employee of the Year 2023\nHackathon Winner"}/><TA label="Languages (comma-separated)" value={form.languages} onChange={v=>setF("languages",v)} rows={2} placeholder="English (Native), Spanish (Fluent)"/><TA label="Volunteer / Interests (optional)" value={form.volunteer} onChange={v=>setF("volunteer",v)} rows={2}/></Card>
              <div style={{textAlign:"center",padding:"14px 0 24px"}}><button onClick={preview} style={{padding:"11px 34px",background:"linear-gradient(90deg,"+tpl.c+","+tpl.a+")",color:"#fff",border:"none",borderRadius:8,fontWeight:800,fontSize:14.5,cursor:"pointer",boxShadow:"0 4px 16px "+tpl.c+"50"}}>Preview My Resume</button></div>
            </div>
          </div>
          <AdSidebar side="right"/>
        </div>
      </div>
    );
  }
  if(step==="preview")return(
    <div style={{height:"100vh",background:"#e8eaed",fontFamily:"'Segoe UI',sans-serif",display:"flex",flexDirection:"column"}}>
      <div style={{background:tpl.c,padding:"10px 18px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 2px 10px rgba(0,0,0,0.19)",flexShrink:0}}>
        <button onClick={()=>setStep("form")} style={{background:"rgba(255,255,255,0.13)",border:"none",color:"#fff",padding:"5px 11px",borderRadius:5,cursor:"pointer",fontSize:12}}>Edit</button>
        <span style={{color:"#fff",fontWeight:700,fontSize:13.5,marginRight:"auto"}}>{tpl.n+" - Preview"}</span>
        <button onClick={()=>{setBusy(true);dlDOCX(tpl,form);setBusy(false);}} disabled={busy} style={{background:"#1a73e8",color:"#fff",border:"none",padding:"7px 15px",borderRadius:6,fontWeight:700,fontSize:12.5,cursor:"pointer"}}>Word</button>
        <button onClick={()=>{setBusy(true);dlPDF(tpl,form);setBusy(false);}} disabled={busy} style={{background:"#e53935",color:"#fff",border:"none",padding:"7px 15px",borderRadius:6,fontWeight:700,fontSize:12.5,cursor:"pointer"}}>PDF</button>
      </div>
      <div style={{background:"#fff",borderBottom:"1px solid #ddd",padding:"5px 18px",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
        <div style={{background:"#e8f5e9",border:"1px solid #81c784",borderRadius:5,padding:"3px 11px",fontSize:11,fontWeight:700,color:"#2e7d32"}}>ATS Score: 95%+</div>
        {["Bullet points","1.15 line-height","Keywords bolded","Photo-left layout"].map((b,i)=><div key={i} style={{background:"#e3f2fd",border:"1px solid #90caf9",borderRadius:5,padding:"3px 10px",fontSize:10.5,color:"#1565c0"}}>{"+ "+b}</div>)}
      </div>
      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        <AdSidebar side="left"/>
        <div style={{flex:1,overflowY:"auto",padding:"18px 14px"}}><div style={{maxWidth:790,margin:"0 auto",background:"#fff",boxShadow:"0 6px 28px rgba(0,0,0,0.12)",borderRadius:2}}><div dangerouslySetInnerHTML={{__html:html}}/></div></div>
        <AdSidebar side="right"/>
      </div>
    </div>
  );
  return null;
}
const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
